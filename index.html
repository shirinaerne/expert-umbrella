<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRNA Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0f1a;
  color:white;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  left:100%;
  transition:0.8s;
  background-size:cover;
  background-position:center;
}

.slide::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.active{left:0;}

h1{
  font-size:50px;
  z-index:2;
  background:linear-gradient(90deg,#4da6ff,#00ffd5);
  -webkit-background-clip:text;
  color:transparent;
}

p{z-index:2;opacity:0.8;text-align:center;max-width:600px;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:30px;
  z-index:2;
}

.card{
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
}

.btn{
  padding:15px 30px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#4da6ff;
  cursor:pointer;
  z-index:2;
}

.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:3;
}

.counter{
  font-size:40px;
  color:#4da6ff;
  z-index:2;
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide active" style="background:url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5') center/cover;">
<h1>CRNA Agency</h1>
<p>Interactive Investor Pitch Presentation</p>
<button class="btn" onclick="next()">Start</button>
</div>

<!-- SLIDE 2 -->
<div class="slide" style="background:url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1f') center/cover;">
<h1>Problem</h1>
<div class="grid">
<div class="card">CRNA shortage</div>
<div class="card">High demand</div>
<div class="card">Hospital delays</div>
</div>
</div>

<!-- SLIDE 3 -->
<div class="slide" style="background:url('https://images.unsplash.com/photo-1581594693702-fbdc51b2763b') center/cover;">
<h1>Solution</h1>
<p>We connect hospitals with verified CRNAs quickly and efficiently.</p>
</div>

<!-- SLIDE 4 -->
<div class="slide" style="background:url('https://images.unsplash.com/photo-1607746882042-944635dfe10e') center/cover;">
<h1>KPI</h1>
<div class="counter" data-target="8000">0</div>
<p>Daily revenue potential</p>
</div>

<!-- SLIDE 5 -->
<div class="slide" style="background:url('https://images.unsplash.com/photo-1580281658629-7d2c1d6e0b4e') center/cover;">
<h1>Investment</h1>
<p>Scaling nationwide CRNA network</p>
<button class="btn">Invest</button>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
</div>

<script>
let slides=document.querySelectorAll('.slide');
let index=0;

function show(){
  slides.forEach(s=>s.classList.remove('active'));
  slides[index].classList.add('active');
}

function next(){
  index=(index+1)%slides.length;
  show();
}

function prev(){
  index=(index-1+slides.length)%slides.length;
  show();
}

let counter=document.querySelector('.counter');
window.addEventListener('click',()=>{
  if(counter.innerText=="0"){
    let i=0;
    let interval=setInterval(()=>{
      i+=200;
      counter.innerText=i;
      if(i>=8000) clearInterval(interval);
    },30);
  }
});

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
});
</script>

</body>
</html>
